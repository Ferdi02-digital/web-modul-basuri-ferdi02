<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Basuri Web Module - Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="fake-landscape">
      <div class="top-bar">
        <div>
          <p class="label">FERDI 02</p>
          <h1>Basuri Module</h1>
        </div>
        <div id="status" class="status off">OFF</div>
      </div>

      <div class="display-box">
        <p class="small-text">Nada Aktif</p>
        <h2 id="toneTitle">01 - Basuri Test 1</h2>
        <p id="moduleInfo">Modul belum aktif</p>
      </div>

      <div class="controls">
        <button id="btnUp" class="btn btn-blue">
          <span>▲</span>
          <b>UP</b>
        </button>

        <button id="btnDown" class="btn btn-blue">
          <span>▼</span>
          <b>DOWN</b>
        </button>

        <button id="btnPlay" class="btn btn-green big">
          <span>▶</span>
          <b>PLAY</b>
        </button>

        <button id="btnStop" class="btn btn-red big">
          <span>■</span>
          <b>STOP</b>
        </button>

        <button id="btnOn" class="btn btn-green">
          <span>⏻</span>
          <b>ON</b>
        </button>

        <button id="btnOff" class="btn btn-red">
          <span>⏻</span>
          <b>OFF</b>
        </button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
